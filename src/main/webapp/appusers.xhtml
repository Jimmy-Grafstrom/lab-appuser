<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Lab AppUser - Management</title>
</h:head>
<h:body>
    <h2>Register new user</h2>
    <h:form id="userForm">
        <h:panelGrid columns="2">
            <h:outputLabel value="Username:"/>
            <h:inputText id="username" value="#{appUserBean.username}" required="true"/>

            <h:outputLabel value="Password:"/>
            <h:inputSecret id="password" value="#{appUserBean.password}" required="true"/>

            <h:commandButton value="Save" action="#{appUserBean.save}">
                <f:ajax execute="@form" render="userTable userForm"/>
            </h:commandButton>
        </h:panelGrid>
    </h:form>

    <hr/>

    <h2>Registered users</h2>
    <h:dataTable id="userTable" value="#{appUserBean.allUsers}" var="user">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{user.id}
        </h:column>
        <h:column>
            <f:facet name="header">Username</f:facet>
            #{user.username}
        </h:column>
    </h:dataTable>
    <p>Go to <h:link value="Login page" outcome="login"/></p>
</h:body>
</html>
